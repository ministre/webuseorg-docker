name: webuseorg-docker

services:
  db:
    image: mysql:5.6
    container_name: webuseorg-db
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-webuse}
      MYSQL_USER: ${MYSQL_USER:-webuse}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-webuse}
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-webuse}
    expose:
      - "3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    restart: unless-stopped

  web:
    build: .
    container_name: webuseorg
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-webuse}
      MYSQL_USER: ${MYSQL_USER:-webuse}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-webuse}
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
    restart: unless-stopped

  phpmyadmin:
    container_name: webuseorg-phpmyadmin
    image: phpmyadmin/phpmyadmin:5.2
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "3000:80"
    restart: unless-stopped